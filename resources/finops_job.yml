resources:
  jobs:
    finops_accelerator_job:
      name: "[${bundle.target}] Databricks FinOps Accelerator"
      max_concurrent_runs: 1

      queue:
        enabled: true

      schedule:
        quartz_cron_expression: "0 0 8 * * ?"
        timezone_id: UTC
        pause_status: ${var.pause_status}

      parameters:
        - name: catalog
          default: ${var.catalog}
        - name: schema
          default: ${var.schema}
        - name: lookback_days
          default: ${var.lookback_days}
        - name: currency_code
          default: ${var.currency_code}
        - name: fallback_dbu_price
          default: ${var.fallback_dbu_price}
        - name: bundle_root
          default: ${workspace.file_path}

      tasks:
        - task_key: run_finops
          python_wheel_task:
            package_name: databricks_finops
            entry_point: main
            parameters:
              - "--catalog"
              - "{{job.parameters.catalog}}"
              - "--schema"
              - "{{job.parameters.schema}}"
              - "--lookback-days"
              - "{{job.parameters.lookback_days}}"
              - "--currency-code"
              - "{{job.parameters.currency_code}}"
              - "--fallback-dbu-price"
              - "{{job.parameters.fallback_dbu_price}}"
              - "--bundle-root"
              - "{{job.parameters.bundle_root}}"
          environment_key: default

      environments:
        - environment_key: default
          spec:
            environment_version: "2"
            dependencies:
              - ${workspace.artifact_path}/.internal/databricks_finops-0.3.0-py3-none-any.whl
